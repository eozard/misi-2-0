<!doctype html>
<!-- Simple login test page for quick manual checks. -->
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Login - Absensi PKL</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div
      class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 px-4"
    >
      <div class="max-w-md w-full">
        <div class="text-center mb-8">
          <div
            class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-full mb-4"
          >
            <svg
              class="w-8 h-8 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v2a2 2 0 01-2 2H7a2 2 0 01-2-2v-2m14-4V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2z"
              ></path>
            </svg>
          </div>
          <h1 class="text-3xl font-bold text-gray-900 mb-2">Absensi PKL</h1>
          <p class="text-gray-600">Login dengan akun Anda</p>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6">
          <div
            id="error"
            class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg text-sm mb-4 hidden"
          ></div>

          <form id="loginForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Nama</label
              >
              <input
                type="text"
                id="nama"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                placeholder="Masukkan nama Anda"
                required
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Password</label
              >
              <input
                type="password"
                id="password"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                placeholder="Masukkan password"
                required
              />
            </div>

            <button
              type="submit"
              id="loginBtn"
              class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 w-full"
            >
              Login
            </button>
          </form>
        </div>

        <div class="text-center mt-4 text-sm text-gray-600">
          <p class="font-semibold mb-1">Demo Credentials:</p>
          <p>
            Admin:
            <span class="font-mono bg-gray-100 px-2 py-1 rounded">admin</span> /
            <span class="font-mono bg-gray-100 px-2 py-1 rounded"
              >admin123</span
            >
          </p>
        </div>
      </div>
    </div>

    <script>
      const API_URL = 'http://localhost:5000/api';

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
          e.preventDefault();

          const nama = document.getElementById('nama').value;
          const password = document.getElementById('password').value;
          const errorDiv = document.getElementById('error');
          const loginBtn = document.getElementById('loginBtn');

          errorDiv.classList.add('hidden');
          loginBtn.disabled = true;
          loginBtn.textContent = 'Loading...';

          try {
              const response = await fetch(`${API_URL}/login`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                      nama,
                      password,
                      deviceId: 'test-device-' + Date.now()
                  })
              });

              const data = await response.json();

              if (data.success) {
                  localStorage.setItem('token', data.token);
                  localStorage.setItem('user', JSON.stringify(data.user));
                  alert('✅ Login berhasil! Role: ' + data.user.role);

                  // Redirect based on role
                  if (data.user.role === 'admin') {
                      window.location.href = '/admin';
                  } else {
                      window.location.href = '/dashboard';
                  }
              } else {
                  throw new Error(data.message || 'Login gagal');
              }
          } catch (error) {
              console.error('Login error:', error);
              errorDiv.textContent = '❌ ' + error.message;
              errorDiv.classList.remove('hidden');
          } finally {
              loginBtn.disabled = false;
              loginBtn.textContent = 'Login';
          }
      });

      // Test connection on load
      console.log('🔍 Testing API connection to:', API_URL);
      fetch(`${API_URL.replace('/api', '')}/health`)
          .then(r => r.json())
          .then(d => console.log('✅ Backend OK:', d))
          .catch(e => console.error('❌ Backend error:', e));
    </script>
  </body>
</html>
